<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUM BREACH | 숫자 맞추기 게임</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="scanline"></div>
<div class="container">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="title">NUM BREACH</div>
  <div class="subtitle">[ CRACK THE CODE · 1–100 · 10 TRIES ]</div>
  <div class="range-display">
    <span class="range-label">RANGE</span>
    <span class="range-val">001 — 100</span>
    <span class="range-label">MAX TRIES</span>
    <span class="range-val">10</span>
  </div>
  <div class="history-label">// ATTEMPT LOG</div>
  <div class="attempts-bar" id="attemptsBar"></div>
  <div class="feedback-box" id="feedbackBox">
    <div class="feedback-main idle" id="feedbackMain">AWAITING INPUT</div>
    <div class="feedback-sub" id="feedbackSub">ENTER A NUMBER TO BEGIN</div>
  </div>
  <div class="input-row">
    <input type="number" class="guess-input" id="guessInput" placeholder="???" min="1" max="100">
    <button class="submit-btn" id="submitBtn" onclick="makeGuess()">ENTER</button>
  </div>
  <div class="stats-row">
    <span>GUESSES USED: <span class="stat-val" id="usedCount">0</span></span>
    <span>REMAINING: <span class="stat-val" id="leftCount">10</span></span>
  </div>
  <div class="history-label">// GUESS HISTORY</div>
  <div class="history-list" id="historyList"></div>
  <button class="restart-btn" onclick="initGame()">[ RESTART GAME ]</button>
</div>
<script src="game.js"></script>
</body>
</html>
